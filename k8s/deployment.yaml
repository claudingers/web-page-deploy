apiVersion: apps/v1
kind: Deployment
metadata:
  name: webpage
spec:
  replicas: 4
  selector:
    matchLabels:
      app: webpage
  template:
    metadata:
      labels:
        app: webpage
    spec:
      containers:
      - name: webpage
        image: fabricioveronez/pagina-exemplo:green
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: webpage
spec:
  selector:
    app: webpage
  ports:
  - port: 8081
    targetPort: 80
  type: LoadBalancer

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: webpage-config
  namespace: apps
data:
  CHAVE_1: "valor_1"
  CHAVE_2: "valor_2"
  CHAVE_3: "valor_3"
  CHAVE_4: "valor_4"
  CHAVE_5: "valor_5"
